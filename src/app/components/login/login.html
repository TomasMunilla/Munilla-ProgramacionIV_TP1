<h2>Iniciar Sesión</h2>

<form #form="ngForm" (ngSubmit)="onSubmit(form)">
    <label for="email">Email: </label>
    <input type="email" name="email" [(ngModel)]="email" required>

    <label for="password">Contraseña: </label>
    <input type="password" name="password" [(ngModel)]="password" required> <!--ngModel bidireccional-->
    
    <button type="submit">Iniciar Sesión</button>
</form>

<hr>

<h3>Acceso Rápido</h3>
<div class="accesos-rapidos">
    <button (click)="accesoRapido('admin@prueba.com', '123456')">Admin</button>
    <button (click)="accesoRapido('jugador@prueba.com', '123456')">Jugador</button>
    <button (click)="accesoRapido('invitado@prueba.com', '123456')">Invitado</button>
</div>

@if (mensajeError) {
    <p>{{ mensajeError }}</p>
}
